# ============================================================
# IC Design SFT — LoRA 训练配置
# 模型：Qwen2.5-0.5B-Instruct
# 框架：LLaMA-Factory
#
# 运行方式：
#   llamafactory-cli train configs/lora_config.yaml
# ============================================================

# ------ 模型 ------
model_name_or_path: /home/ubuntu/models/Qwen/Qwen2.5-0.5B-Instruct
template: qwen

# ------ 训练任务 ------
stage: sft
do_train: true
finetuning_type: lora

# ------ LoRA 参数 ------
lora_target: q_proj,v_proj
lora_rank: 16                  # 秩，越大表达能力越强但显存越多

# ------ 数据集 ------
dataset: ic_dataset            # 对应 LlamaFactory/data/dataset_info.json 中的注册名
# dataset_dir: data            # 如数据不在默认路径，取消注释并指定

# ------ 训练超参 ------
num_train_epochs: 3
learning_rate: 2.0e-4
per_device_train_batch_size: 4
gradient_accumulation_steps: 4 # 等效 batch size = 4 × 4 = 16
bf16: true                     # A100/H100 建议开启

# ------ 日志与保存 ------
logging_steps: 50
save_steps: 500
output_dir: saves/qwen2.5-ic-lora

# ------ 导出（merge 后的完整模型）------
# 训练完后运行：
#   llamafactory-cli export configs/lora_config.yaml
# export_dir: /home/ubuntu/models/qwen2.5-ic-merged
